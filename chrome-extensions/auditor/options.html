<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Page Auditor — Settings</title>
  <style>
    :root {
      --bg: #0f172a; --surface: #1e293b; --border: #334155;
      --text: #e2e8f0; --muted: #94a3b8; --accent: #3b82f6;
      --green: #22c55e; --radius: 8px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; background: var(--bg); color: var(--text); padding: 32px; max-width: 480px; }
    h1 { font-size: 18px; margin-bottom: 24px; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; margin-bottom: 16px; }
    p { font-size: 13px; color: var(--muted); line-height: 1.6; }
    .btn { padding: 8px 16px; border-radius: 6px; border: none; font-size: 13px; font-weight: 600; cursor: pointer; margin-top: 12px; }
    .btn-danger { background: #ef4444; color: #fff; }
    .status { font-size: 12px; color: var(--green); margin-top: 8px; display: none; }
  </style>
</head>
<body>
  <h1>⚙ Page Auditor Settings</h1>

  <div class="card">
    <p>The Page Auditor stores report history in your browser's local storage. Reports are kept on this device only.</p>
    <button class="btn btn-danger" id="btn-clear">Clear All Data</button>
    <div class="status" id="status">✓ Data cleared</div>
  </div>

  <script>
    document.getElementById('btn-clear').addEventListener('click', async () => {
      if (!confirm('Clear all sites and reports?')) return;
      await chrome.storage.local.clear();
      const s = document.getElementById('status');
      s.style.display = 'block';
      setTimeout(() => s.style.display = 'none', 2000);
    });
  </script>
</body>
</html>
